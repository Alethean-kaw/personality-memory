name: personality-memory
version: 0.4.0
description: >
  Self-contained OpenClaw skill for profile-aware conversation memory, long-term user modeling,
  lifecycle-aware persona generation, JSONL session runtime integration, retrieval/context preparation,
  storage migration, review governance, replay evaluation, and manual memory revision without external services.
language: python
entrypoint: python -m personality_memory
data_dir: ./data
commands:
  - session-runtime
  - migrate-storage
  - list-profiles
  - create-profile
  - show-profile
  - set-default-profile
  - ingest
  - extract
  - consolidate
  - build-persona
  - retrieve-context
  - prepare-context
  - show-memory
  - show-persona
  - list-review
  - show-review
  - resolve-review
  - reopen-candidate
  - forget
  - revise
  - replay-eval
  - export
